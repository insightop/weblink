# Cloudflare Pages 配置
# Durable Object 定义在独立 Worker（见 workers/signaling/）
name = "streamkit"
pages_build_output_dir = "dist"
compatibility_date = "2025-11-01"

[placement]
mode = "smart"

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 0.25

[observability.traces]
enabled = true
head_sampling_rate = 0.1

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "StreamKit"
script_name = "streamkit-worker"
